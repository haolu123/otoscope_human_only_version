name: Build macOS Otoscope Exam

# Builds the human-only macOS app without uploading the video dataset.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "otoscope_exam/**"
      - ".github/workflows/build-macos.yml"

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: otoscope_exam/environment-macos.yml
          activate-environment: otoscope_exam_mac
          auto-activate-base: false

      - name: Build macOS package
        shell: bash -l {0}
        run: |
          conda activate otoscope_exam_mac
          python -m pip install --upgrade --force-reinstall imageio-ffmpeg
          python - <<'PY'
          import imageio_ffmpeg
          exe = imageio_ffmpeg.get_ffmpeg_exe()
          print(f"imageio_ffmpeg executable: {exe}")
          PY
          chmod +x otoscope_exam/build_macos.sh
          ./otoscope_exam/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac
          path: otoscope_exam/dist_macos/otoscope_exam_mac.zip
          if-no-files-found: error
          retention-days: 14

      - name: Split macOS artifact for connector download
        shell: bash -l {0}
        run: |
          mkdir -p otoscope_exam/dist_macos/parts
          split -b 10m -d -a 3 \
            otoscope_exam/dist_macos/otoscope_exam_mac.zip \
            otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-

      - name: Upload macOS artifact part 000
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_000
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-000
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 001
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_001
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-001
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 002
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_002
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-002
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 003
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_003
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-003
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 004
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_004
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-004
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 005
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_005
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-005
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifact part 006
        uses: actions/upload-artifact@v4
        with:
          name: otoscope_exam_mac_part_006
          path: otoscope_exam/dist_macos/parts/otoscope_exam_mac.zip.part-006
          if-no-files-found: error
          retention-days: 14
